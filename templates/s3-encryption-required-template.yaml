apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: s3encryptionrequired
  annotations:
    description: Requires S3 buckets to have server-side KMS encryption configured using the ACK S3 CRD field 'encryption'
spec:
  crd:
    spec:
      names:
        kind: S3EncryptionRequired
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package s3encryptionrequired
        violation[{"msg": msg}] {
          not has_encryption
          msg := "S3 Bucket must have spec.encryption.rules with aws:kms sseAlgorithm"
        }
        has_encryption {
          # ACK S3 CRD uses 'encryption' field (not serverSideEncryptionConfiguration)
          rules := input.review.object.spec.encryption.rules[_]
          rules.applyServerSideEncryptionByDefault.sseAlgorithm == "aws:kms"
        }
